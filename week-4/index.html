<!DOCTYPE html>
<html>

<head>
  <script>
    let globalId = 1;
    let todoState = [];
    let oldTodoState = [];

    function addTodoToDom(todo) {
      const parent = document.getElementById("todos");

      const child = document.createElement("div");
      child.setAttribute("id", todo.id);

      const title = document.createElement("h4");
      title.innerHTML = todo.title;

      const description = document.createElement("p");
      description.innerHTML = todo.description;

      child.appendChild(title);
      child.appendChild(description);

      parent.appendChild(child);
    }

    function removeTodoFromDom(todo) {
      const element = document.getElementById(todo.id);

      if(element){
        element.remove();
      }
    }

    function updateTodoInDom(oldTodo, newTodo) {
        const element = document.getElementById(oldTodo.id);

        element.children[0].innerHTML = newTodo.title;
        element.children[1].innerHTML = newTodo.description;
    }

    function updateState(newTodos) {
      // calculate the diff b/w newTodos and oldTodos.
      // More specifically, find out what todos are - 
      // 1. added
      // 2. deleted
      // 3. updated
      const added = [];
      const deleted = [];
      const updated = [];
      // calculate these 3 arrays
      // call addTodo, removeTodo, updateTodo functions on each of the
      // elements

      // find added and updated todos
      for (let i = 0; i < newTodos.length; i++){
        const newTodo = newTodos[i];

        const oldTodo = oldTodoState.find(
          todo => todo.id === newTodo.id
        );

        if (!oldTodo) {
          added.push(newTodo);
        } else if (oldTodo.title !== newTodo.title || oldTodo.description !== newTodo.description) {
          updated.push({
            oldTodo, 
            newTodo
          });
        }
      }

      // find deleted todos
      for (let i = 0; i < oldTodoState.length; i++) {
        const oldTodo = oldTodoState[i];

        const exists = newTodos.find(
          todo => todo.id === oldTodo.id
        );
        
        if (!exists) {
          deleted.push(oldTodo);
        }
      }

      // apply dom changes

      added.forEach(todo => addTodoToDom(todo));

      deleted.forEach(todo => removeTodoFromDom(todo));

      updated.forEach(todo => updateTodoInDom(todo.oldTodo, todo.newTodo));

      oldTodoState = [...newTodos];
    }

    function addTodo() {
      const title = document.getElementById("title").value;
      const description = document.getElementById("description").value;
      todoState.push({
        title: title,
        description: description,
        id: globalId++,
      })
      updateState(todoState);
    }
  </script>
</head>

<body>
  <input type="text" id="title" placeholder="Todo title"></input> <br /><br />
  <input type="text" id="description" placeholder="Todo description"></input> <br /><br />
  <button onclick="addTodo()">Add todo</button>
  <br /> <br />

  <div id="todos">

  </div>
</body>

</html>
